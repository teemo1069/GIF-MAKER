<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ValhallaForge">
    <title>Valhalla Forge - Runic GIF Studio</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Noto+Serif+TC:wght@400;700&display=swap');

        :root {
            /* 北歐神話色系 */
            --rune-bg: #0b0f12; /* 深淵黑 */
            --rune-card: rgba(22, 26, 30, 0.85); /* 黑曜石 */
            --rune-gold: #d4af37; /* 神域金 */
            --rune-gold-glow: rgba(212, 175, 55, 0.4);
            --rune-ice: #88c0d0; /* 寒冰藍 */
            --rune-text: #eae0c8; /* 羊皮紙白 */
            --rune-muted: #5b657a; /* 褪色石灰 */
            --rune-red: #8b0000; /* 戰神暗紅 */
            
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            background-color: var(--rune-bg);
            color: var(--rune-text);
            font-family: 'Noto Serif TC', serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 神秘背景：符文法陣的微光感 */
        .app-background {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 30%, #1a2430 0%, #050709 100%);
            z-index: -1;
        }
        
        .app-background::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.02) 0px, rgba(212, 175, 55, 0.02) 2px, transparent 2px, transparent 10px);
            opacity: 0.5;
        }

        .header {
            padding-top: calc(var(--safe-top) + 15px);
            padding-bottom: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 20px;
            margin: 0;
            color: var(--rune-gold);
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--rune-gold-glow);
        }
        
        .header .subtitle {
            font-size: 10px;
            color: var(--rune-muted);
            letter-spacing: 4px;
            margin-top: 4px;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: calc(var(--safe-bottom) + 100px);
            -webkit-overflow-scrolling: touch;
        }

        .card {
            background: var(--rune-card);
            backdrop-filter: blur(15px);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .section-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 14px;
            color: var(--rune-ice);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(136, 192, 208, 0.5);
        }

        .upload-area {
            border: 1px solid var(--rune-gold);
            background: rgba(212, 175, 55, 0.05);
            border-radius: 4px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .upload-area::before, .upload-area::after {
            content: "᛭";
            position: absolute;
            color: var(--rune-gold);
            font-size: 10px;
            opacity: 0.5;
        }
        .upload-area::before { top: 4px; left: 4px; }
        .upload-area::after { bottom: 4px; right: 4px; }

        .upload-area input {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
            z-index: 2;
        }

        .upload-icon { 
            font-family: serif; 
            font-size: 40px; 
            color: var(--rune-gold); 
            margin-bottom: 8px;
            text-shadow: 0 0 15px var(--rune-gold-glow);
        }

        .rune-btn {
            background: transparent;
            color: var(--rune-gold);
            border: 1px solid var(--rune-gold);
            border-radius: 4px;
            padding: 14px;
            font-size: 15px;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
            letter-spacing: 2px;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .rune-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--rune-gold-glow), transparent);
            transition: left 0.5s;
        }

        .rune-btn:active::before { left: 100%; }
        .rune-btn:active { background: rgba(212, 175, 55, 0.2); transform: scale(0.98); }
        
        .rune-btn.primary { background: rgba(212, 175, 55, 0.15); box-shadow: 0 0 10px var(--rune-gold-glow); }
        .rune-btn.success { color: var(--rune-ice); border-color: var(--rune-ice); background: rgba(136, 192, 208, 0.1); }
        .rune-btn.danger { color: var(--rune-text); border-color: var(--rune-muted); }

        .input-group { margin-top: 18px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; color: var(--rune-text); letter-spacing: 1px; }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--rune-muted);
            position: relative;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: var(--rune-bg);
            border: 2px solid var(--rune-gold);
            transform: rotate(45deg); /* 菱形滑塊 */
            box-shadow: 0 0 8px var(--rune-gold-glow);
            cursor: pointer;
        }

        .speed-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .speed-chip {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--rune-muted);
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            font-family: 'Cinzel Decorative', cursive;
            font-weight: 700;
            color: var(--rune-muted);
            transition: all 0.3s;
            font-size: 14px;
        }

        .speed-chip.active { 
            border-color: var(--rune-ice); 
            color: var(--rune-ice);
            background: rgba(136, 192, 208, 0.15);
            text-shadow: 0 0 8px rgba(136, 192, 208, 0.6);
            box-shadow: inset 0 0 10px rgba(136, 192, 208, 0.2);
        }

        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--safe-bottom) + 65px);
            background: rgba(10, 12, 15, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--rune-muted);
            font-size: 11px;
            gap: 6px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .tab-item.active { 
            color: var(--rune-gold); 
            text-shadow: 0 0 8px var(--rune-gold-glow);
        }
        
        .tab-icon { font-family: serif; font-size: 22px; }

        .progress-box { margin-top: 20px; display: none; }
        .bar-bg { background: rgba(0,0,0,0.5); border: 1px solid var(--rune-muted); height: 6px; margin-top: 10px; position: relative; }
        .bar-fill { 
            background: var(--rune-gold); 
            height: 100%; width: 0%; 
            transition: width 0.2s; 
            box-shadow: 0 0 10px var(--rune-gold);
        }
        
        .result-img { 
            width: 100%; 
            border-radius: 4px; 
            margin-top: 15px; 
            border: 2px solid var(--rune-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }

        .page { display: none; animation: fadeIn 0.4s ease forwards; }
        .page.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #ios-video-container {
            position: absolute;
            top: -9999px; left: -9999px;
            opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app-background"></div>
<div id="ios-video-container"></div>

<header class="header">
    <h1>VALHALLA FORGE</h1>
    <div class="subtitle">RUNIC GIF ARTIFACTS</div>
</header>

<main class="main-content">
    
    <!-- 轉換頁 (ᛟ Odal: Heritage/Estate) -->
    <div id="page-convert" class="page active">
        <div class="card">
            <span class="section-title"><span style="font-size:18px;">ᛟ</span> 影像鎔鑄爐</span>
            <div class="upload-area">
                <input type="file" accept="video/*" onchange="loadMedia(this, 'video')">
                <span class="upload-icon">ᛟ</span>
                <span style="font-size:13px; color:var(--rune-muted); letter-spacing:1px;" id="name-video">獻上凡界影像 (選擇影片)</span>
            </div>
            
            <div class="input-group">
                <div class="label-row"><span>法陣尺度 (解析度)</span><span id="val-width" style="color:var(--rune-gold)">320px</span></div>
                <input type="range" min="160" max="640" step="20" value="320" oninput="updateVal('width', this.value)">
            </div>

            <div class="input-group">
                <div class="label-row"><span>時之流速 (FPS)</span><span id="val-fps" style="color:var(--rune-gold)">12</span></div>
                <input type="range" min="5" max="30" value="12" oninput="updateVal('fps', this.value)">
            </div>

            <button class="rune-btn primary" onclick="startConvert()">注入奧丁神力 (開始轉換)</button>
            
            <div id="prog-convert" class="progress-box">
                <div class="label-row"><span id="log-convert">凝聚魔力中...</span></div>
                <div class="bar-bg"><div id="fill-convert" class="bar-fill"></div></div>
            </div>

            <div id="res-convert"></div>
        </div>
    </div>

    <!-- 壓縮頁 (ᛒ Berkanan: Birch/Birth) -->
    <div id="page-compress" class="page">
        <div class="card">
            <span class="section-title"><span style="font-size:18px;">ᛒ</span> 封印壓縮陣</span>
            <div class="upload-area">
                <input type="file" accept="image/gif" id="input-compress" onchange="loadMedia(this, 'compress')">
                <span class="upload-icon">ᛒ</span>
                <span style="font-size:13px; color:var(--rune-muted); letter-spacing:1px;" id="name-compress">置入待封印的法器 (GIF)</span>
            </div>
            
            <div class="input-group">
                <div class="label-row"><span>封印強度 (壓縮率)</span></div>
                <div class="speed-grid">
                    <div class="speed-chip active" onclick="setComp(0.5, 64, this)">中階封印</div>
                    <div class="speed-chip" onclick="setComp(0.3, 32, this)">極限禁咒</div>
                    <div class="speed-chip" onclick="setComp(0.8, 128, this)">輕微加護</div>
                </div>
            </div>

            <button class="rune-btn" style="border-color:var(--rune-ice); color:var(--rune-ice);" onclick="startCompress()">啟動結界 (執行壓縮)</button>
            <div id="prog-compress" class="progress-box">
                <div class="bar-bg"><div id="fill-compress" class="bar-fill" style="background:var(--rune-ice); box-shadow:0 0 10px var(--rune-ice);"></div></div>
            </div>
            <div id="res-compress"></div>
        </div>
    </div>

    <!-- 速度頁 (ᛋ Sowilo: Sun/Lightning) -->
    <div id="page-speed" class="page">
        <div class="card">
            <span class="section-title"><span style="font-size:18px;">ᛋ</span> 時空扭曲儀</span>
            <div class="upload-area">
                <input type="file" accept="image/gif" id="input-speed" onchange="loadMedia(this, 'speed')">
                <span class="upload-icon">ᛋ</span>
                <span style="font-size:13px; color:var(--rune-muted); letter-spacing:1px;" id="name-speed">置入需扭曲時間之物</span>
            </div>

            <div class="input-group">
                <div class="label-row"><span>時間法則 (最高倍率優先)</span></div>
                <div class="speed-grid">
                    <!-- 最高倍率 4.0x 在最頂端 -->
                    <div class="speed-chip" onclick="setSpd(4, this)">4.0x 迅雷</div>
                    <div class="speed-chip" onclick="setSpd(2, this)">2.0x 疾風</div>
                    <div class="speed-chip active" onclick="setSpd(1, this)">1.0x 現世</div>
                    <div class="speed-chip" onclick="setSpd(0.5, this)">0.5x 泥沼</div>
                    <div class="speed-chip" onclick="setSpd(0.25, this)">0.25x 永劫</div>
                </div>
            </div>

            <button class="rune-btn" style="border-color:var(--rune-gold); color:var(--rune-gold);" onclick="startSpeed()">干涉時間軸 (調整速度)</button>
            <div id="prog-speed" class="progress-box">
                <div class="bar-bg"><div id="fill-speed" class="bar-fill"></div></div>
            </div>
            <div id="res-speed"></div>
        </div>
    </div>

</main>

<nav class="tab-bar">
    <div class="tab-item active" onclick="switchTab('convert', this)">
        <span class="tab-icon">ᛟ</span>
        <span>鎔鑄 (Convert)</span>
    </div>
    <div class="tab-item" onclick="switchTab('compress', this)">
        <span class="tab-icon">ᛒ</span>
        <span>封印 (Compress)</span>
    </div>
    <div class="tab-item" onclick="switchTab('speed', this)">
        <span class="tab-icon">ᛋ</span>
        <span>時空 (Speed)</span>
    </div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif-frames@1.0.1/dist/gif-frames.min.js"></script>

<script>
    const AppState = {
        video: null, compress: null, speed: null, workerUrl: '',
        config: { width: 320, fps: 12, comp: { scale: 0.5, colors: 64 }, speed: 1.0 }
    };

    (async () => {
        try {
            const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
            AppState.workerUrl = URL.createObjectURL(await resp.blob());
        } catch(e) { console.error("符文核心載入失敗", e); }
    })();

    function switchTab(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`page-${p}`).classList.add('active');
        el.classList.add('active');
    }

    function updateVal(key, val) {
        AppState.config[key] = parseInt(val);
        document.getElementById(`val-${key}`).textContent = val + (key==='width'?'px':'');
    }

    function setComp(s, c, el) {
        AppState.config.comp = { scale: s, colors: c };
        document.querySelectorAll('#page-compress .speed-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function setSpd(v, el) {
        AppState.config.speed = v;
        document.querySelectorAll('#page-speed .speed-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function loadMedia(input, type) {
        const file = input.files[0];
        if(!file) return;
        AppState[type] = file;
        document.getElementById(`name-${type}`).textContent = "📜 " + file.name;
        document.getElementById(`name-${type}`).style.color = type === 'compress' ? 'var(--rune-ice)' : 'var(--rune-gold)';
    }

    // --- 影片轉 GIF ---
    async function startConvert() {
        if(!AppState.video) return;
        const prog = document.getElementById('prog-convert');
        const fill = document.getElementById('fill-convert');
        prog.style.display = 'block';

        const video = document.createElement('video');
        video.src = URL.createObjectURL(AppState.video);
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('playsinline', '');

        const container = document.getElementById('ios-video-container');
        container.innerHTML = '';
        container.appendChild(video);

        await new Promise((resolve) => {
            video.addEventListener('loadeddata', resolve, { once: true });
            video.load();
        });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = AppState.config.width;
        canvas.height = Math.floor(AppState.config.width * (video.videoHeight / video.videoWidth));

        const gif = new GIF({ workers: 2, quality: 10, width: canvas.width, height: canvas.height, workerScript: AppState.workerUrl });
        const safeDuration = Math.max(0.1, Math.min(video.duration - 0.2, 8)); 
        const totalFrames = Math.floor(safeDuration * AppState.config.fps);

        for(let i=0; i < totalFrames; i++) {
            video.currentTime = i * (1 / AppState.config.fps);
            await new Promise(resolve => {
                video.addEventListener('seeked', () => setTimeout(resolve, 60), { once: true });
            });
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            gif.addFrame(canvas, {copy: true, delay: 1000 / AppState.config.fps});
            fill.style.width = (i / totalFrames * 50) + '%';
        }

        gif.on('progress', p => fill.style.width = (50 + p*50) + '%');
        gif.on('finished', blob => { renderResult('convert', blob); container.innerHTML = ''; });
        gif.render();
    }

    // --- 壓縮 GIF ---
    async function startCompress() {
        if(!AppState.compress) return;
        document.getElementById('prog-compress').style.display = 'block';
        const fill = document.getElementById('fill-compress');

        const frames = await gifFrames({ url: AppState.compress, frames: 'all', outputType: 'canvas' });
        const { scale, colors } = AppState.config.comp;
        const w = Math.floor(frames[0].getImage().width * scale);
        const h = Math.floor(frames[0].getImage().height * scale);

        const gif = new GIF({ workers: 2, quality: 30, width: w, height: h, workerScript: AppState.workerUrl });
        frames.forEach((f, i) => {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(f.getImage(), 0, 0, w, h);
            gif.addFrame(c, {copy: true, delay: f.frameInfo.delay * 10});
            fill.style.width = (i/frames.length*50) + '%';
        });

        gif.on('progress', p => fill.style.width = (50 + p*50) + '%');
        gif.on('finished', blob => renderResult('compress', blob));
        gif.render();
    }

    // --- 速度調整 ---
    async function startSpeed() {
        if(!AppState.speed) return;
        document.getElementById('prog-speed').style.display = 'block';
        const fill = document.getElementById('fill-speed');

        const frames = await gifFrames({ url: AppState.speed, frames: 'all', outputType: 'canvas' });
        const gif = new GIF({ workers: 2, quality: 10, width: frames[0].getImage().width, height: frames[0].getImage().height, workerScript: AppState.workerUrl });

        frames.forEach((f, i) => {
            const originalDelay = f.frameInfo.delay * 10 || 100; 
            gif.addFrame(f.getImage(), {copy: true, delay: originalDelay / AppState.config.speed});
            fill.style.width = (i/frames.length*50) + '%';
        });

        gif.on('progress', p => fill.style.width = (50 + p*50) + '%');
        gif.on('finished', blob => renderResult('speed', blob));
        gif.render();
    }

    function renderResult(type, blob) {
        const url = URL.createObjectURL(blob);
        const container = document.getElementById(`res-${type}`);
        container.innerHTML = `
            <img src="${url}" class="result-img">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <button class="rune-btn success" onclick="shareToiOS('${url}', 'Valhalla_Artifact_${Date.now()}.gif')">銘刻至相簿</button>
                <button class="rune-btn danger" onclick="location.reload()">消散重鑄</button>
            </div>
            ${type === 'convert' ? `<button class="rune-btn" style="margin-top:10px;" onclick="transferTo('compress', '${url}')">傳送至封印陣 (去壓縮)</button>` : ''}
        `;
        document.getElementById(`prog-${type}`).style.display = 'none';
    }

    async function transferTo(tab, url) {
        const blob = await fetch(url).then(r => r.blob());
        AppState[tab] = new File([blob], "runic_transfer.gif", {type:"image/gif"});
        document.getElementById(`name-${tab}`).textContent = "✨ 符文殘片已傳送";
        document.getElementById(`name-${tab}`).style.color = "var(--rune-ice)";
        switchTab(tab, document.querySelectorAll('.tab-item')[tab==='compress'?1:2]);
    }

    async function shareToiOS(url, filename) {
        try {
            const blob = await fetch(url).then(r => r.blob());
            const file = new File([blob], filename, { type: 'image/gif' });
            
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Valhalla Forge GIF' });
            } else {
                const a = document.createElement('a');
                a.href = url; a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }
        } catch (err) { console.log('儀式中斷', err); }
    }
</script>

</body>
</html>
