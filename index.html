<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel GIF Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --px-bg: #1a1a2e;
    --px-panel: #16213e;
    --px-card: #0f3460;
    --px-accent: #e94560;
    --px-yellow: #f5a623;
    --px-green: #4ecdc4;
    --px-purple: #a855f7;
    --px-white: #e8e8e8;
    --px-gray: #888;
    --px-border: #e94560;
    --shadow: 4px 4px 0px #000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  body {
    background: var(--px-bg);
    color: var(--px-white);
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(232,68,96,0.05) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(232,68,96,0.05) 32px);
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .title {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--px-accent);
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #7a0000;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--px-yellow);
    font-size: 20px;
    letter-spacing: 3px;
  }

  .pixel-char {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 3px solid var(--px-accent);
  }

  .tab {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 14px;
    background: var(--px-panel);
    border: 2px solid var(--px-gray);
    border-bottom: none;
    color: var(--px-gray);
    cursor: pointer;
    transition: all 0.1s;
    letter-spacing: 1px;
  }

  .tab:hover { background: var(--px-card); color: var(--px-white); border-color: var(--px-accent); }
  .tab.active { background: var(--px-card); color: var(--px-yellow); border-color: var(--px-accent); }

  .panel {
    background: var(--px-panel);
    border: 3px solid var(--px-accent);
    padding: 20px;
    box-shadow: 6px 6px 0 #000;
  }

  .section-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--px-green);
    letter-spacing: 2px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::before { content: '▶'; color: var(--px-accent); }

  .drop-zone {
    border: 3px dashed var(--px-purple);
    background: rgba(168,85,247,0.07);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--px-yellow);
    background: rgba(245,166,35,0.1);
  }

  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(2px 2px 0 #000);
  }

  .drop-text { font-size: 22px; color: var(--px-purple); }
  .drop-hint { font-size: 15px; color: var(--px-gray); margin-top: 6px; }

  .file-info {
    background: var(--px-card);
    border: 2px solid var(--px-green);
    padding: 10px 14px;
    margin-top: 12px;
    display: none;
    align-items: center;
    gap: 10px;
  }

  .file-info.show { display: flex; }
  .file-info-icon { font-size: 22px; }
  .file-info-name { color: var(--px-green); font-size: 16px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-info-size { color: var(--px-gray); font-size: 14px; }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 16px;
  }

  .setting-box {
    background: var(--px-card);
    border: 2px solid var(--px-gray);
    padding: 12px;
  }

  .setting-box:hover { border-color: var(--px-purple); }

  .setting-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--px-yellow);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .px-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 6px;
    background: #333;
    outline: none;
    border: 1px solid #555;
  }

  .px-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--px-accent);
    border: 2px solid #000;
    cursor: pointer;
  }

  .px-slider::-webkit-slider-thumb:hover { background: var(--px-yellow); }

  .slider-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--px-white);
    text-align: right;
    margin-top: 6px;
  }

  .px-select, .px-input {
    width: 100%;
    background: #0a0a1a;
    color: var(--px-white);
    border: 2px solid var(--px-gray);
    padding: 6px;
    font-family: 'VT323', monospace;
    font-size: 17px;
    outline: none;
  }

  .px-select:hover, .px-input:hover { border-color: var(--px-accent); }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.08s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn:active { transform: translate(2px, 2px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: var(--px-accent); color: #fff; box-shadow: 4px 4px 0 #7a0000; }
  .btn-green { background: var(--px-green); color: #000; box-shadow: 4px 4px 0 #1a5c58; }
  .btn-yellow { background: var(--px-yellow); color: #000; box-shadow: 4px 4px 0 #7a5000; }
  .btn-purple { background: var(--px-purple); color: #fff; box-shadow: 4px 4px 0 #4a1a7a; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

  .progress-area { margin-top: 16px; display: none; }
  .progress-area.show { display: block; }

  .progress-bar-bg { height: 20px; background: #111; border: 2px solid var(--px-gray); position: relative; }
  .progress-bar-fill {
    height: 100%;
    background: repeating-linear-gradient(90deg, var(--px-accent) 0, var(--px-accent) 8px, var(--px-yellow) 8px, var(--px-yellow) 16px);
    background-size: 32px 100%;
    animation: march 0.5s linear infinite;
    width: 0%;
    transition: width 0.2s;
  }

  @keyframes march { from { background-position: 0 0; } to { background-position: 32px 0; } }

  .log-box {
    background: #050510;
    border: 2px solid #222;
    padding: 10px;
    margin-top: 10px;
    height: 90px;
    overflow-y: auto;
    font-size: 13px;
    color: var(--px-green);
  }

  .results-area { margin-top: 20px; display: none; }
  .results-area.show { display: block; }

  .result-card { background: var(--px-card); border: 3px solid var(--px-green); padding: 16px; }
  .gif-preview { max-width: 100%; display: block; margin: 10px auto; border: 2px solid var(--px-purple); }

  .history-item {
    background: var(--px-card);
    border: 2px solid var(--px-gray);
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 10px;
  }

  .history-thumb { width: 60px; height: 40px; object-fit: cover; }
  
  .notice {
    background: rgba(245,166,35,0.1);
    border: 2px solid var(--px-yellow);
    padding: 10px;
    margin-bottom: 15px;
    font-size: 14px;
    color: var(--px-yellow);
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">★ GIF STUDIO ★</div>
    <div class="subtitle">PIXEL GIF WORKSHOP <span class="pixel-char">_</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('convert')">🎬 轉換</div>
    <div class="tab" onclick="switchTab('compress')">📦 壓縮</div>
    <div class="tab" onclick="switchTab('speed')">⚡ 速度</div>
    <div class="tab" onclick="switchTab('history')">📁 紀錄</div>
  </div>

  <div id="tab-convert" class="panel">
    <div class="section-label">上傳影片</div>
    <div class="notice">建議影片長度 10 秒以內，以防止瀏覽器記憶體不足當機。</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" accept="video/*" onchange="handleVideoSelect(event)">
      <span class="drop-icon">🎥</span>
      <div class="drop-text">點擊或拖曳影片</div>
    </div>
    <div class="file-info" id="fileInfo">
      <span class="file-info-icon">🎬</span>
      <span class="file-info-name" id="fileName">-</span>
      <span class="file-info-size" id="fileSize">-</span>
    </div>

    <div class="settings-grid">
      <div class="setting-box">
        <div class="setting-title">🎞 FPS</div>
        <input class="px-slider" type="range" min="5" max="30" value="10" id="fps" oninput="updateSlider('fps','fpsVal')">
        <div class="slider-val" id="fpsVal">10 FPS</div>
      </div>
      <div class="setting-box">
        <div class="setting-title">📐 寬度</div>
        <input class="px-slider" type="range" min="100" max="640" value="320" step="10" id="width" oninput="updateSlider('width','widthVal')">
        <div class="slider-val" id="widthVal">320 px</div>
      </div>
      <div class="setting-box">
        <div class="setting-title">⏱ 開始 (秒)</div>
        <input class="px-input" type="number" id="startTime" value="0" min="0">
      </div>
      <div class="setting-box">
        <div class="setting-title">⏳ 長度 (秒)</div>
        <input class="px-input" type="number" id="duration" value="3" min="1" max="20">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="convertBtn" onclick="startConvert()" disabled>▶ 開始轉換</button>
    </div>

    <div class="progress-area" id="convertProgress">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div class="log-box" id="logBox"></div>
    </div>
    <div class="results-area" id="convertResult"></div>
  </div>

  <!-- 其他面板簡化，專注於解決卡住問題 -->
  <div id="tab-compress" class="panel" style="display:none">
    <div class="section-label">壓縮功能</div>
    <p style="color:var(--px-gray)">請先從「轉換」功能生成 GIF 後點選「去壓縮」。</p>
  </div>
  
  <div id="tab-speed" class="panel" style="display:none">
     <div class="section-label">調整速度</div>
     <p style="color:var(--px-gray)">功能開發中，目前請使用轉換設定中的 FPS 調整速度。</p>
  </div>

  <div id="tab-history" class="panel" style="display:none">
    <div class="section-label">處理紀錄</div>
    <div id="historyList"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
const state = {
  videoFile: null,
  workerBlobUrl: null,
  history: []
};

// 解決 Worker 載入問題：主動獲取 Worker 腳本並轉為本地 Blob
async function initWorker() {
  try {
    const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
    const blob = await response.blob();
    state.workerBlobUrl = URL.createObjectURL(blob);
    console.log("Worker Blob Ready");
  } catch (e) {
    console.error("Failed to fetch worker script", e);
  }
}
initWorker();

function switchTab(name) {
  ['convert','compress','speed','history'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, idx) => {
    el.classList.toggle('active', ['convert','compress','speed','history'][idx] === name);
  });
  if(name === 'history') renderHistory();
}

function updateSlider(id, valId) {
  const el = document.getElementById(id);
  document.getElementById(valId).textContent = el.value + (id==='fps'?' FPS':' px');
}

function handleVideoSelect(e) {
  const f = e.target.files[0];
  if(f) {
    state.videoFile = f;
    document.getElementById('fileInfo').classList.add('show');
    document.getElementById('fileName').textContent = f.name;
    document.getElementById('fileSize').textContent = (f.size/1024/1024).toFixed(2) + ' MB';
    document.getElementById('convertBtn').disabled = false;
  }
}

function log(msg, isError = false) {
  const box = document.getElementById('logBox');
  const p = document.createElement('p');
  p.textContent = `> ${msg}`;
  if(isError) p.style.color = 'var(--px-accent)';
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}

async function startConvert() {
  if(!state.videoFile || !state.workerBlobUrl) {
    alert("資源尚未準備就緒，請稍候再試。");
    return;
  }

  const fps = parseInt(document.getElementById('fps').value);
  const width = parseInt(document.getElementById('width').value);
  const start = parseFloat(document.getElementById('startTime').value) || 0;
  const duration = parseFloat(document.getElementById('duration').value) || 3;

  document.getElementById('convertProgress').classList.add('show');
  document.getElementById('convertBtn').disabled = true;
  document.getElementById('logBox').innerHTML = '';
  
  log("載入影片...");
  const video = document.createElement('video');
  video.src = URL.createObjectURL(state.videoFile);
  video.muted = true;

  video.onloadedmetadata = async () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const aspect = video.videoHeight / video.videoWidth;
    canvas.width = width;
    canvas.height = width * aspect;

    const gif = new GIF({
      workers: 2,
      quality: 10,
      width: canvas.width,
      height: canvas.height,
      workerScript: state.workerBlobUrl
    });

    const totalFrames = Math.floor(fps * duration);
    const interval = 1 / fps;

    log(`預計擷取 ${totalFrames} 幀...`);

    for(let i=0; i < totalFrames; i++) {
      video.currentTime = start + (i * interval);
      await new Promise(r => {
        video.onseeked = r;
      });
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      gif.addFrame(ctx, {copy: true, delay: (1 / fps) * 1000});
      
      const pct = Math.floor((i / totalFrames) * 70);
      document.getElementById('progressBar').style.width = pct + '%';
      if(i % 5 === 0) log(`處理中: ${i}/${totalFrames}`);
    }

    log("開始編碼 GIF (這可能需要一點時間)...");
    gif.on('progress', p => {
      const pct = 70 + Math.floor(p * 30);
      document.getElementById('progressBar').style.width = pct + '%';
    });

    gif.on('finished', blob => {
      document.getElementById('progressBar').style.width = '100%';
      const url = URL.createObjectURL(blob);
      log("轉換完成！", false);
      showResult(url, blob.size);
      state.history.push({ name: `pixel-${Date.now()}.gif`, url, size: blob.size });
      document.getElementById('convertBtn').disabled = false;
    });

    gif.render();
  };
}

function showResult(url, size) {
  const area = document.getElementById('convertResult');
  area.classList.add('show');
  area.innerHTML = `
    <div class="result-card">
      <p>大小: ${(size/1024/1024).toFixed(2)} MB</p>
      <img src="${url}" class="gif-preview">
      <div class="btn-row">
        <a href="${url}" download="pixel-studio.gif" class="btn btn-green">⬇ 下載 GIF</a>
      </div>
    </div>
  `;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if(state.history.length === 0) {
    list.innerHTML = '<p>尚無紀錄</p>';
    return;
  }
  list.innerHTML = state.history.map(item => `
    <div class="history-item">
      <img src="${item.url}" class="history-thumb">
      <div>
        <p>${item.name}</p>
        <p style="font-size:12px; color:var(--px-gray)">${(item.size/1024).toFixed(1)} KB</p>
      </div>
      <a href="${item.url}" download="${item.name}" class="btn btn-primary" style="margin-left:auto; padding:5px 10px;">⬇</a>
    </div>
  `).join('');
}
</script>
</body>
</html>
