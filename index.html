</head>
<body>

<div class="app-background"></div>
<div id="ios-video-container"></div>

<header class="header">
    <h1>VALHALLA FORGE</h1>
    <div style="font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:2px;">LONG ARTIFACT REFORGER</div>
</header>

<main class="main-content">
    
    <div id="page-convert" class="page active">
        <div class="card">
            <span class="section-title">ᛟ 影像鎔鑄爐</span>
            <div class="upload-area">
                <input type="file" accept="video/*" id="video-input" onchange="handleVideoUpload(this)">
                <span style="font-size:40px; color:var(--rune-gold);">ᛟ</span>
                <span id="name-video" style="font-size:12px; color:rgba(255,255,255,0.5);">獻上凡界長卷 (選擇影片)</span>
            </div>
            
            <div class="input-group">
                <div class="label-row"><span>法陣尺度</span><span id="val-width" style="color:var(--rune-gold)">320px</span></div>
                <input type="range" min="160" max="480" step="20" value="320" oninput="updateCfg('width', this.value)">
            </div>

            <div class="input-group">
                <div class="label-row"><span>鎔鑄時長 (秒)</span><span id="val-duration" style="color:var(--rune-gold)">5s</span></div>
                <input type="range" min="1" max="60" value="5" id="duration-slider" oninput="updateCfg('duration', this.value)">
            </div>

            <div class="input-group">
                <div class="label-row"><span>時之流速 (FPS)</span><span id="val-fps" style="color:var(--rune-gold)">10</span></div>
                <input type="range" min="5" max="24" value="10" oninput="updateCfg('fps', this.value)">
            </div>

            <button class="rune-btn primary" onclick="startConvert()">注入長效神力 (開始鎔鑄)</button>
            
            <div id="prog-convert" class="progress-box">
                <div class="label-row"><span id="log-convert">凝聚時空殘片...</span></div>
                <div class="bar-bg"><div id="fill-convert" class="bar-fill"></div></div>
            </div>

            <div id="res-convert"></div>
        </div>
    </div>

    <!-- 其他頁面省略內容以保持空間，邏輯與前版一致 -->
    <div id="page-compress" class="page"><div class="card"><span class="section-title">ᛒ 封印壓縮陣</span><p style="text-align:center; opacity:0.6;">請先從鎔鑄爐產生物件</p></div></div>
    <div id="page-speed" class="page"><div class="card"><span class="section-title">ᛋ 時空扭曲儀</span><p style="text-align:center; opacity:0.6;">請先從鎔鑄爐產生物件</p></div></div>

</main>

<nav class="tab-bar">
    <div class="tab-item active" onclick="switchTab('convert', this)"><span>ᛟ</span><span>鎔鑄</span></div>
    <div class="tab-item" onclick="switchTab('compress', this)"><span>ᛒ</span><span>封印</span></div>
    <div class="tab-item" onclick="switchTab('speed', this)"><span>ᛋ</span><span>時空</span></div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
    const AppState = {
        videoFile: null,
        workerUrl: '',
        config: { width: 320, fps: 10, duration: 5 }
    };

    (async () => {
        const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
        AppState.workerUrl = URL.createObjectURL(await resp.blob());
    })();

    function updateCfg(k, v) {
        AppState.config[k] = parseInt(v);
        document.getElementById(`val-${k}`).textContent = v + (k==='width'?'px':(k==='duration'?'s':''));
    }

    function handleVideoUpload(input) {
        const file = input.files[0];
        if(!file) return;
        AppState.videoFile = file;
        document.getElementById('name-video').textContent = "📜 " + file.name;
        
        // 自動偵測影片長度並更新滑桿上限
        const v = document.createElement('video');
        v.src = URL.createObjectURL(file);
        v.onloadedmetadata = () => {
            const max = Math.floor(v.duration);
            const slider = document.getElementById('duration-slider');
            slider.max = max;
            if(AppState.config.duration > max) updateCfg('duration', max);
        };
    }

    async function startConvert() {
        if(!AppState.videoFile) return;
        const prog = document.getElementById('prog-convert');
        const fill = document.getElementById('fill-convert');
        const log = document.getElementById('log-convert');
        prog.style.display = 'block';

        const video = document.createElement('video');
        video.src = URL.createObjectURL(AppState.videoFile);
        video.muted = true; video.playsInline = true;
        
        const container = document.getElementById('ios-video-container');
        container.innerHTML = ''; container.appendChild(video);

        await new Promise(r => { video.onloadeddata = r; video.load(); });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = AppState.config.width;
        canvas.height = Math.floor(AppState.config.width * (video.videoHeight / video.videoWidth));

        const gif = new GIF({ 
            workers: 4, quality: 15, 
            width: canvas.width, height: canvas.height, 
            workerScript: AppState.workerUrl 
        });

        // 決定要轉換的總幀數
        const totalDuration = Math.min(video.duration, AppState.config.duration);
        const totalFrames = Math.floor(totalDuration * AppState.config.fps);
        const interval = 1 / AppState.config.fps;

        for(let i=0; i < totalFrames; i++) {
            video.currentTime = i * interval;
            await new Promise(r => {
                video.onseeked = () => setTimeout(r, 80); // iOS 需要稍微等待渲染
            });
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            gif.addFrame(canvas, {copy: true, delay: interval * 1000});
            
            const p = Math.floor((i / totalFrames) * 40);
            fill.style.width = p + '%';
            log.textContent = `擷取靈魂片段: ${i+1}/${totalFrames}`;
        }

        gif.on('progress', p => {
            fill.style.width = (40 + p * 60) + '%';
            log.textContent = `北歐神力織造中: ${Math.floor(p*100)}%`;
        });

        gif.on('finished', blob => {
            const url = URL.createObjectURL(blob);
            document.getElementById('res-convert').innerHTML = `
                <img src="${url}" class="result-img">
                <button class="rune-btn" style="background:var(--rune-ice); color:#000; margin-top:15px;" onclick="saveToAlbum('${url}')">銘刻於神殿 (儲存)</button>
            `;
            prog.style.display = 'none';
            container.innerHTML = '';
        });

        gif.render();
    }

    function saveToAlbum(url) {
        const a = document.createElement('a');
        a.href = url; a.download = `Valhalla_${Date.now()}.gif`;
        a.click();
    }

    function switchTab(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(tb => tb.classList.remove('active'));
        document.getElementById(`page-${p}`).classList.add('active');
        el.classList.add('active');
    }
</script>

</body>
</html>
