<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PixelStudio">
    <title>Pixel Studio - iOS Edition</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&family=Press+Start+2P&display=swap');

        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.8);
            --ios-accent: #0A84FF;
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-yellow: #FFD60A;
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            background-color: var(--ios-bg);
            color: #fff;
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-background {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(125deg, #1a1a2e 0%, #000 100%);
            z-index: -1;
        }

        .header {
            padding-top: calc(var(--safe-top) + 10px);
            padding-bottom: 15px;
            text-align: center;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.5);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            margin: 0;
            color: var(--ios-accent);
            letter-spacing: 1px;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: calc(var(--safe-bottom) + 100px);
            -webkit-overflow-scrolling: touch;
        }

        .card {
            background: var(--ios-card);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .section-title {
            font-size: 12px;
            font-family: 'Press Start 2P';
            color: var(--ios-yellow);
            margin-bottom: 15px;
            display: block;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 15px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .upload-area input {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
        }

        .upload-icon { font-size: 32px; margin-bottom: 8px; }

        .ios-btn {
            background: var(--ios-accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        .ios-btn:active { transform: scale(0.96); opacity: 0.8; }
        .ios-btn.secondary { background: #323235; }
        .ios-btn.success { background: var(--ios-green); color: #000; }

        .input-group { margin-top: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #8e8e93; }
        
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #3a3a3c;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 24px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        .speed-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .speed-chip {
            background: #2c2c2e;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-weight: 600;
        }

        .speed-chip.active { background: var(--ios-accent); }

        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--safe-bottom) + 65px);
            background: rgba(20, 20, 20, 0.94);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8e8e93;
            font-size: 10px;
            gap: 4px;
        }

        .tab-item.active { color: var(--ios-accent); }
        .tab-icon { font-size: 24px; }

        .progress-box { margin-top: 15px; display: none; }
        .bar-bg { background: #3a3a3c; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .bar-fill { background: var(--ios-accent); height: 100%; width: 0%; transition: width 0.2s; }
        
        .result-img { width: 100%; border-radius: 12px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .page { display: none; }
        .page.active { display: block; }
        
        /* 隱藏的影片區塊（為了騙過 iOS） */
        #ios-video-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app-background"></div>

<!-- 必須放在 DOM 裡 iOS 才會乖乖解碼影片 -->
<div id="ios-video-container"></div>

<header class="header">
    <h1>PIXEL STUDIO</h1>
</header>

<main class="main-content">
    
    <!-- 轉換頁 -->
    <div id="page-convert" class="page active">
        <div class="card">
            <span class="section-title">VIDEO TO GIF</span>
            <div class="upload-area">
                <input type="file" accept="video/*" onchange="loadMedia(this, 'video')">
                <span class="upload-icon">🎞️</span>
                <span style="font-size:14px; color:#8e8e93" id="name-video">選擇影片檔案</span>
            </div>
            
            <div class="input-group">
                <div class="label-row"><span>解析度</span><span id="val-width">320px</span></div>
                <input type="range" min="160" max="640" step="20" value="320" oninput="updateVal('width', this.value)">
            </div>

            <div class="input-group">
                <div class="label-row"><span>FPS</span><span id="val-fps">12</span></div>
                <input type="range" min="5" max="30" value="12" oninput="updateVal('fps', this.value)">
            </div>

            <button class="ios-btn" onclick="startConvert()">開始處理</button>
            
            <div id="prog-convert" class="progress-box">
                <div class="label-row"><span id="log-convert">準備中...</span></div>
                <div class="bar-bg"><div id="fill-convert" class="bar-fill"></div></div>
            </div>

            <div id="res-convert"></div>
        </div>
    </div>

    <!-- 壓縮頁 -->
    <div id="page-compress" class="page">
        <div class="card">
            <span class="section-title">COMPRESSOR</span>
            <div class="upload-area">
                <input type="file" accept="image/gif" id="input-compress" onchange="loadMedia(this, 'compress')">
                <span class="upload-icon">📦</span>
                <span style="font-size:14px; color:#8e8e93" id="name-compress">選擇要壓縮的 GIF</span>
            </div>
            
            <div class="input-group">
                <div class="label-row"><span>壓縮強度</span></div>
                <div class="speed-grid">
                    <div class="speed-chip active" onclick="setComp(0.5, 64, this)">中等</div>
                    <div class="speed-chip" onclick="setComp(0.3, 32, this)">極限</div>
                    <div class="speed-chip" onclick="setComp(0.8, 128, this)">輕微</div>
                </div>
            </div>

            <button class="ios-btn" style="background:var(--ios-yellow); color:#000;" onclick="startCompress()">執行壓縮</button>
            <div id="prog-compress" class="progress-box">
                <div class="bar-bg"><div id="fill-compress" class="bar-fill"></div></div>
            </div>
            <div id="res-compress"></div>
        </div>
    </div>

    <!-- 速度頁 -->
    <div id="page-speed" class="page">
        <div class="card">
            <span class="section-title">SPEED TUNER</span>
            <div class="upload-area">
                <input type="file" accept="image/gif" id="input-speed" onchange="loadMedia(this, 'speed')">
                <span class="upload-icon">⚡</span>
                <span style="font-size:14px; color:#8e8e93" id="name-speed">選擇 GIF 調整速度</span>
            </div>

            <div class="input-group">
                <div class="label-row"><span>預設倍率 (最高優先)</span></div>
                <div class="speed-grid">
                    <!-- 依照您的要求：最高倍率排在列表最頂端 -->
                    <div class="speed-chip" onclick="setSpd(4, this)">4.0x</div>
                    <div class="speed-chip" onclick="setSpd(2, this)">2.0x</div>
                    <div class="speed-chip active" onclick="setSpd(1, this)">1.0x</div>
                    <div class="speed-chip" onclick="setSpd(0.5, this)">0.5x</div>
                    <div class="speed-chip" onclick="setSpd(0.25, this)">0.25x</div>
                </div>
            </div>

            <button class="ios-btn" style="background:var(--ios-green); color:#000;" onclick="startSpeed()">調整速度</button>
            <div id="prog-speed" class="progress-box">
                <div class="bar-bg"><div id="fill-speed" class="bar-fill"></div></div>
            </div>
            <div id="res-speed"></div>
        </div>
    </div>

</main>

<nav class="tab-bar">
    <div class="tab-item active" onclick="switchTab('convert', this)">
        <span class="tab-icon">🎬</span>
        <span>轉換</span>
    </div>
    <div class="tab-item" onclick="switchTab('compress', this)">
        <span class="tab-icon">📦</span>
        <span>壓縮</span>
    </div>
    <div class="tab-item" onclick="switchTab('speed', this)">
        <span class="tab-icon">⚡</span>
        <span>速度</span>
    </div>
</nav>

<!-- 核心庫 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif-frames@1.0.1/dist/gif-frames.min.js"></script>

<script>
    const AppState = {
        video: null,
        compress: null,
        speed: null,
        workerUrl: '',
        config: { width: 320, fps: 12, comp: { scale: 0.5, colors: 64 }, speed: 1.0 }
    };

    (async () => {
        const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
        AppState.workerUrl = URL.createObjectURL(await resp.blob());
    })();

    function switchTab(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
        document.getElementById(`page-${p}`).classList.add('active');
        el.classList.add('active');
    }

    function updateVal(key, val) {
        AppState.config[key] = parseInt(val);
        document.getElementById(`val-${key}`).textContent = val + (key==='width'?'px':'');
    }

    function setComp(s, c, el) {
        AppState.config.comp = { scale: s, colors: c };
        document.querySelectorAll('#page-compress .speed-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function setSpd(v, el) {
        AppState.config.speed = v;
        document.querySelectorAll('#page-speed .speed-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    function loadMedia(input, type) {
        const file = input.files[0];
        if(!file) return;
        AppState[type] = file;
        document.getElementById(`name-${type}`).textContent = file.name;
        document.getElementById(`name-${type}`).style.color = 'var(--ios-accent)';
    }

    // --- 【重大修正】影片轉 GIF (修復所有黑畫面問題) ---
    async function startConvert() {
        if(!AppState.video) return;
        const prog = document.getElementById('prog-convert');
        const fill = document.getElementById('fill-convert');
        prog.style.display = 'block';

        const video = document.createElement('video');
        video.src = URL.createObjectURL(AppState.video);
        video.muted = true;
        video.playsInline = true; // iOS 強制要求
        video.setAttribute('playsinline', '');

        // 解決黑屏關鍵 1：將影片掛載到 DOM 中，強迫 iOS 引擎解碼
        const container = document.getElementById('ios-video-container');
        container.innerHTML = '';
        container.appendChild(video);

        // 等待影片完全載入資料
        await new Promise((resolve) => {
            video.addEventListener('loadeddata', resolve, { once: true });
            video.load();
        });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = AppState.config.width;
        canvas.height = Math.floor(AppState.config.width * (video.videoHeight / video.videoWidth));

        const gif = new GIF({
            workers: 2, quality: 10, width: canvas.width, height: canvas.height, workerScript: AppState.workerUrl
        });

        // 解決結尾黑屏：預留 0.2 秒緩衝，防止抓到結尾的空影格
        const safeDuration = Math.max(0.1, Math.min(video.duration - 0.2, 8)); 
        const totalFrames = Math.floor(safeDuration * AppState.config.fps);

        for(let i=0; i < totalFrames; i++) {
            video.currentTime = i * (1 / AppState.config.fps);
            
            await new Promise(resolve => {
                video.addEventListener('seeked', () => {
                    // 解決黑屏關鍵 2：iOS 的 seeked 會提早觸發，必須等待 60 毫秒讓像素繪製完成
                    setTimeout(resolve, 60);
                }, { once: true });
            });
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            gif.addFrame(canvas, {copy: true, delay: 1000 / AppState.config.fps});
            fill.style.width = (i / totalFrames * 50) + '%';
        }

        gif.on('progress', p => fill.style.width = (50 + p*50) + '%');
        gif.on('finished', blob => {
            renderResult('convert', blob);
            container.innerHTML = ''; // 清理 DOM
        });
        gif.render();
    }

    // --- 壓縮 GIF ---
    async function startCompress() {
        if(!AppState.compress) return;
        document.getElementById('prog-compress').style.display = 'block';
        const fill = document.getElementById('fill-compress');

        const frames = await gifFrames({ url: AppState.compress, frames: 'all', outputType: 'canvas' });
        const { scale, colors } = AppState.config.comp;
        const w = Math.floor(frames[0].getImage().width * scale);
        const h = Math.floor(frames[0].getImage().height * scale);

        const gif = new GIF({ workers: 2, quality: 30, width: w, height: h, workerScript: AppState.workerUrl });
        frames.forEach((f, i) => {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(f.getImage(), 0, 0, w, h);
            gif.addFrame(c, {copy: true, delay: f.frameInfo.delay * 10});
            fill.style.width = (i/frames.length*50) + '%';
        });

        gif.on('progress', p => fill.style.width = (50 + p*50) + '%');
        gif.on('finished', blob => renderResult('compress', blob));
        gif.render();
    }

    // --- 速度調整 ---
    async function startSpeed() {
        if(!AppState.speed) return;
        document.getElementById('prog-speed').style.display = 'block';
        const fill = document.getElementById('fill-speed');

        const frames = await gifFrames({ url: AppState.speed, frames: 'all', outputType: 'canvas' });
        const gif = new GIF({ 
            workers: 2, quality: 10, 
            width: frames[0].getImage().width, 
            height: frames[0].getImage().height, 
            workerScript: AppState.workerUrl 
        });

        frames.forEach((f, i) => {
            const originalDelay = f.frameInfo.delay * 10 || 100; 
            gif.addFrame(f.getImage(), {copy: true, delay: originalDelay / AppState.config.speed});
            fill.style.width = (i/frames.length*50) + '%';
        });

        gif.on('progress', p => fill.style.width = (50 + p*50) + '%');
        gif.on('finished', blob => renderResult('speed', blob));
        gif.render();
    }

    function renderResult(type, blob) {
        const url = URL.createObjectURL(blob);
        const container = document.getElementById(`res-${type}`);
        container.innerHTML = `
            <img src="${url}" class="result-img">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <!-- 改用 iOS 原生 Share API -->
                <button class="ios-btn success" onclick="shareToiOS('${url}', 'PixelStudio_${Date.now()}.gif')">儲存至相簿</button>
                <button class="ios-btn secondary" onclick="location.reload()">重新開始</button>
            </div>
            ${type === 'convert' ? `<button class="ios-btn secondary" style="margin-top:10px;" onclick="transferTo('compress', '${url}')">發送到壓縮</button>` : ''}
        `;
        document.getElementById(`prog-${type}`).style.display = 'none';
    }

    async function transferTo(tab, url) {
        const blob = await fetch(url).then(r => r.blob());
        AppState[tab] = new File([blob], "transfer.gif", {type:"image/gif"});
        document.getElementById(`name-${tab}`).textContent = "已從轉換結果載入";
        switchTab(tab, document.querySelectorAll('.tab-item')[tab==='compress'?1:2]);
    }

    // --- 【重大修正】iOS 原生儲存功能 ---
    async function shareToiOS(url, filename) {
        try {
            const blob = await fetch(url).then(r => r.blob());
            const file = new File([blob], filename, { type: 'image/gif' });
            
            // 如果設備支援原生 Share Sheet (iOS 最佳做法)
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                    files: [file],
                    title: 'PixelStudio GIF',
                });
            } else {
                // 降級方案
                const a = document.createElement('a');
                a.href = url; 
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        } catch (err) {
            console.log('分享/儲存被取消或失敗', err);
        }
    }
</script>

</body>
</html>
