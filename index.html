<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel GIF Studio - 全功能版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

        :root {
            --px-bg: #1a1a2e;
            --px-panel: #16213e;
            --px-card: #0f3460;
            --px-accent: #e94560;
            --px-yellow: #f5a623;
            --px-green: #4ecdc4;
            --px-purple: #a855f7;
            --px-white: #e8e8e8;
            --px-gray: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

        body {
            background: var(--px-bg);
            color: var(--px-white);
            font-family: 'VT323', monospace;
            font-size: 18px;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(232,68,96,0.05) 32px),
                              repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(232,68,96,0.05) 32px);
        }

        .app { max-width: 820px; margin: 0 auto; padding: 20px 16px 40px; }

        .header { text-align: center; margin-bottom: 24px; }
        .title { font-family: 'Press Start 2P', monospace; font-size: 18px; color: var(--px-accent); text-shadow: 3px 3px 0 #000; margin-bottom: 8px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 3px solid var(--px-accent); }
        .tab { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 10px 14px; background: var(--px-panel); border: 2px solid var(--px-gray); border-bottom: none; color: var(--px-gray); cursor: pointer; }
        .tab.active { background: var(--px-card); color: var(--px-yellow); border-color: var(--px-accent); }

        .panel { background: var(--px-panel); border: 3px solid var(--px-accent); padding: 20px; box-shadow: 6px 6px 0 #000; display: none; }
        .panel.active { display: block; }

        .section-label { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--px-green); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-label::before { content: '▶'; color: var(--px-accent); }

        .drop-zone { border: 3px dashed var(--px-purple); background: rgba(168,85,247,0.07); padding: 30px; text-align: center; position: relative; cursor: pointer; }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
        .drop-icon { font-size: 40px; display: block; margin-bottom: 10px; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
        .setting-box { background: var(--px-card); border: 2px solid var(--px-gray); padding: 12px; }
        .setting-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--px-yellow); margin-bottom: 8px; }

        .px-slider { width: 100%; height: 6px; background: #333; outline: none; -webkit-appearance: none; }
        .px-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--px-accent); border: 2px solid #000; cursor: pointer; }
        
        .px-input, .px-select { width: 100%; background: #0a0a1a; color: #fff; border: 2px solid var(--px-gray); padding: 5px; font-family: 'VT323'; font-size: 18px; }

        .btn { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 12px 18px; border: none; cursor: pointer; transition: 0.1s; display: inline-flex; align-items: center; gap: 8px; color: #fff; }
        .btn:active { transform: translate(2px, 2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--px-accent); box-shadow: 4px 4px 0 #7a0000; }
        .btn-green { background: var(--px-green); color: #000; box-shadow: 4px 4px 0 #1a5c58; }
        .btn-purple { background: var(--px-purple); box-shadow: 4px 4px 0 #4a1a7a; }
        .btn-yellow { background: var(--px-yellow); color: #000; box-shadow: 4px 4px 0 #7a5000; }

        .progress-area { margin-top: 20px; display: none; }
        .progress-area.show { display: block; }
        .progress-bar { height: 15px; background: #111; border: 2px solid var(--px-gray); margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--px-accent); width: 0%; transition: width 0.1s; }

        .log-box { background: #000; color: var(--px-green); padding: 10px; height: 80px; overflow-y: auto; font-size: 14px; margin-top: 10px; border: 1px solid #333; }
        .result-card { background: var(--px-card); border: 3px solid var(--px-green); padding: 15px; margin-top: 20px; text-align: center; }
        .gif-preview { max-width: 100%; border: 2px solid var(--px-purple); margin: 10px 0; }

        .file-info { display: none; background: #0a0a1a; padding: 10px; margin-top: 10px; border: 1px solid var(--px-green); font-size: 14px; color: var(--px-green); }

        /* 倍率列表：最高倍率在最頂端 */
        .speed-presets { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="title">★ GIF STUDIO PRO ★</div>
        <p>最強影像處理工作坊</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('convert')">🎬 轉換</div>
        <div class="tab" onclick="switchTab('compress')">📦 壓縮</div>
        <div class="tab" onclick="switchTab('speed')">⚡ 速度</div>
        <div class="tab" onclick="switchTab('history')">📁 紀錄</div>
    </div>

    <!-- 轉換面板 -->
    <div id="panel-convert" class="panel active">
        <div class="section-label">影片轉 GIF</div>
        <div class="drop-zone">
            <input type="file" accept="video/*" onchange="handleFileSelect(event, 'video')">
            <span class="drop-icon">🎥</span>
            <p>點擊或拖入影片 (MP4/MOV)</p>
        </div>
        <div id="info-video" class="file-info"></div>

        <div class="settings-grid">
            <div class="setting-box">
                <div class="setting-title">FPS (影格率)</div>
                <input type="range" min="5" max="24" value="12" class="px-slider" id="conv-fps">
            </div>
            <div class="setting-box">
                <div class="setting-title">寬度 (PX)</div>
                <input type="range" min="100" max="600" value="320" step="10" class="px-slider" id="conv-width">
            </div>
            <div class="setting-box">
                <div class="setting-title">開始時間 (秒)</div>
                <input type="number" value="0" step="0.5" class="px-input" id="conv-start">
            </div>
            <div class="setting-box">
                <div class="setting-title">持續長度 (秒)</div>
                <input type="number" value="3" step="0.5" class="px-input" id="conv-duration">
            </div>
        </div>
        <button class="btn btn-primary" style="margin-top:15px; width:100%;" id="btn-convert" onclick="processVideo()">🚀 開始轉換</button>
        
        <div id="prog-convert" class="progress-area">
            <div class="progress-bar"><div id="fill-convert" class="progress-fill"></div></div>
            <div id="log-convert" class="log-box"></div>
        </div>
        <div id="res-convert"></div>
    </div>

    <!-- 壓縮面板 -->
    <div id="panel-compress" class="panel">
        <div class="section-label">壓縮 GIF 檔案</div>
        <div class="drop-zone">
            <input type="file" accept="image/gif" id="input-compress" onchange="handleFileSelect(event, 'compress')">
            <span class="drop-icon">📦</span>
            <p>點擊或拖入 GIF 進行壓縮</p>
        </div>
        <div id="info-compress" class="file-info"></div>
        
        <div class="settings-grid">
            <div class="setting-box">
                <div class="setting-title">尺寸縮放</div>
                <select id="comp-scale" class="px-select">
                    <option value="1">100% (不縮放)</option>
                    <option value="0.75">75%</option>
                    <option value="0.5" selected>50%</option>
                    <option value="0.25">25%</option>
                </select>
            </div>
            <div class="setting-box">
                <div class="setting-title">色彩數量</div>
                <select id="comp-colors" class="px-select">
                    <option value="256">256 色</option>
                    <option value="128" selected>128 色</option>
                    <option value="64">64 色</option>
                    <option value="32">32 色</option>
                </select>
            </div>
        </div>
        <button class="btn btn-purple" style="margin-top:15px; width:100%;" onclick="processCompress()">📦 執行壓縮</button>
        
        <div id="prog-compress" class="progress-area">
            <div class="progress-bar"><div id="fill-compress" class="progress-fill"></div></div>
            <div id="log-compress" class="log-box"></div>
        </div>
        <div id="res-compress"></div>
    </div>

    <!-- 速度面板 -->
    <div id="panel-speed" class="panel">
        <div class="section-label">調整播放速度</div>
        <div class="drop-zone">
            <input type="file" accept="image/gif" id="input-speed" onchange="handleFileSelect(event, 'speed')">
            <span class="drop-icon">⚡</span>
            <p>點擊或拖入 GIF 調整速度</p>
        </div>
        <div id="info-speed" class="file-info"></div>

        <div class="speed-presets">
            <!-- 根據記憶：最高倍率在最頂端 -->
            <button class="btn btn-primary" onclick="setSpeedValue(4)">4.0x</button>
            <button class="btn btn-primary" onclick="setSpeedValue(2)">2.0x</button>
            <button class="btn btn-green" onclick="setSpeedValue(1)">1.0x</button>
            <button class="btn btn-yellow" onclick="setSpeedValue(0.5)">0.5x</button>
            <button class="btn btn-yellow" onclick="setSpeedValue(0.25)">0.25x</button>
        </div>
        
        <div class="setting-box" style="margin-top:10px;">
            <div class="setting-title">自定義倍率 (倍)</div>
            <input type="number" id="speed-val" value="1.0" step="0.1" class="px-input">
        </div>
        
        <button class="btn btn-green" style="margin-top:15px; width:100%;" onclick="processSpeed()">⚡ 調整速度並輸出</button>
        
        <div id="prog-speed" class="progress-area">
            <div class="progress-bar"><div id="fill-speed" class="progress-fill"></div></div>
            <div id="log-speed" class="log-box"></div>
        </div>
        <div id="res-speed"></div>
    </div>

    <!-- 紀錄面板 -->
    <div id="panel-history" class="panel">
        <div class="section-label">歷史處理紀錄</div>
        <div id="history-list"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<!-- 關鍵：由 JS 直接解析 GIF 的庫 -->
<script src="https://cdn.jsdelivr.net/npm/gif-frames@1.0.1/dist/gif-frames.min.js"></script>

<script>
    const state = {
        videoFile: null,
        compressFile: null,
        speedFile: null,
        workerUrl: null,
        history: []
    };

    // 初始化：抓取 Worker 腳本避免跨域卡住
    async function init() {
        try {
            const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
            const blob = await resp.blob();
            state.workerUrl = URL.createObjectURL(blob);
            console.log("Worker Ready");
        } catch(e) { console.error("Worker Load Failed"); }
    }
    init();

    function switchTab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('panel-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'history') renderHistory();
    }

    function setSpeedValue(v) { document.getElementById('speed-val').value = v; }

    function handleFileSelect(e, type) {
        const file = e.target.files[0];
        if(!file) return;
        const info = document.getElementById(`info-${type}`);
        info.style.display = 'block';
        info.innerHTML = `檔案: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
        state[`${type}File`] = file;
    }

    function addLog(id, msg) {
        const log = document.getElementById(`log-${id}`);
        const p = document.createElement('p');
        p.textContent = `> ${msg}`;
        log.appendChild(p);
        log.scrollTop = log.scrollHeight;
    }

    // 1. 影片轉 GIF
    async function processVideo() {
        if(!state.videoFile || !state.workerUrl) return alert("請選擇影片或等待初始化");
        const fps = parseInt(document.getElementById('conv-fps').value);
        const width = parseInt(document.getElementById('conv-width').value);
        const start = parseFloat(document.getElementById('conv-start').value);
        const duration = parseFloat(document.getElementById('conv-duration').value);

        document.getElementById('prog-convert').style.display = 'block';
        document.getElementById('log-convert').innerHTML = '';
        addLog('convert', '準備影片資源...');

        const video = document.createElement('video');
        video.src = URL.createObjectURL(state.videoFile);
        video.muted = true;
        
        video.onloadedmetadata = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const aspect = video.videoHeight / video.videoWidth;
            canvas.width = width;
            canvas.height = width * aspect;

            const gif = new GIF({
                workers: 2, quality: 10, width: canvas.width, height: canvas.height, workerScript: state.workerUrl
            });

            const totalFrames = Math.floor(fps * duration);
            addLog('convert', `擷取中 (總計 ${totalFrames} 幀)...`);

            for(let i=0; i < totalFrames; i++) {
                video.currentTime = start + (i * (1/fps));
                await new Promise(r => { video.onseeked = r; });
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                gif.addFrame(ctx, {copy: true, delay: (1000/fps)});
                document.getElementById('fill-convert').style.width = ((i/totalFrames)*50) + '%';
            }

            addLog('convert', '編碼 GIF 中...');
            gif.on('progress', p => {
                document.getElementById('fill-convert').style.width = (50 + p*50) + '%';
            });

            gif.on('finished', blob => {
                const url = URL.createObjectURL(blob);
                finishProcess('convert', url, blob.size);
            });
            gif.render();
        };
    }

    // 2. 壓縮 GIF (實作：重新抽樣與量化)
    async function processCompress() {
        if(!state.compressFile) return alert("請選擇 GIF 檔案");
        const scale = parseFloat(document.getElementById('comp-scale').value);
        const colors = parseInt(document.getElementById('comp-colors').value);

        document.getElementById('prog-compress').style.display = 'block';
        document.getElementById('log-compress').innerHTML = '';
        addLog('compress', '解析 GIF 影格...');

        const frames = await gifFrames({ url: state.compressFile, frames: 'all', outputType: 'canvas' });
        const first = frames[0].getImage();
        const w = first.width * scale;
        const h = first.height * scale;

        const gif = new GIF({
            workers: 2, quality: 30 - (colors/10), width: w, height: h, workerScript: state.workerUrl
        });

        frames.forEach((f, i) => {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(f.getImage(), 0, 0, w, h);
            // 抓取原本幀延遲 (預設 100ms)
            gif.addFrame(canvas, { copy: true, delay: 100 });
            document.getElementById('fill-compress').style.width = ((i/frames.length)*50) + '%';
        });

        addLog('compress', '重新編碼壓縮中...');
        gif.on('progress', p => document.getElementById('fill-compress').style.width = (50 + p*50) + '%');
        gif.on('finished', blob => finishProcess('compress', URL.createObjectURL(blob), blob.size));
        gif.render();
    }

    // 3. 調整速度 (實作：修改 Delay Time)
    async function processSpeed() {
        if(!state.speedFile) return alert("請選擇 GIF 檔案");
        const mult = parseFloat(document.getElementById('speed-val').value);

        document.getElementById('prog-speed').style.display = 'block';
        document.getElementById('log-speed').innerHTML = '';
        addLog('speed', `解析中... 準備調整為 ${mult} 倍速`);

        const frames = await gifFrames({ url: state.speedFile, frames: 'all', outputType: 'canvas' });
        const first = frames[0].getImage();
        const gif = new GIF({
            workers: 2, quality: 10, width: first.width, height: first.height, workerScript: state.workerUrl
        });

        frames.forEach((f, i) => {
            const delay = 100 / mult; // 1.0x = 100ms, 2.0x = 50ms
            gif.addFrame(f.getImage(), { copy: true, delay: delay });
            document.getElementById('fill-speed').style.width = ((i/frames.length)*50) + '%';
        });

        addLog('speed', '生成新速度 GIF...');
        gif.on('progress', p => document.getElementById('fill-speed').style.width = (50 + p*50) + '%');
        gif.on('finished', blob => finishProcess('speed', URL.createObjectURL(blob), blob.size));
        gif.render();
    }

    function finishProcess(id, url, size) {
        addLog(id, '處理成功！');
        const res = document.getElementById(`res-${id}`);
        const name = `pixel-${id}-${Date.now()}.gif`;
        res.innerHTML = `
            <div class="result-card">
                <p>完成！檔案大小: ${(size/1024/1024).toFixed(2)} MB</p>
                <img src="${url}" class="gif-preview">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <a href="${url}" download="${name}" class="btn btn-green" style="text-decoration:none; justify-content:center;">⬇ 下載</a>
                    <button class="btn btn-yellow" onclick="sendTo('compress', '${url}')">📦 去壓縮</button>
                    <button class="btn btn-purple" onclick="sendTo('speed', '${url}')">⚡ 調速度</button>
                    <button class="btn btn-primary" onclick="location.reload()">↺ 重做</button>
                </div>
            </div>
        `;
        state.history.push({ url, size, name });
    }

    // 連動功能：將目前的結果發送到另一個面板
    async function sendTo(tab, url) {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const file = new File([blob], "temp.gif", { type: "image/gif" });
        
        if(tab === 'compress') {
            state.compressFile = file;
            document.getElementById('info-compress').style.display = 'block';
            document.getElementById('info-compress').innerHTML = "已從轉換結果載入 GIF";
        } else {
            state.speedFile = file;
            document.getElementById('info-speed').style.display = 'block';
            document.getElementById('info-speed').innerHTML = "已從轉換結果載入 GIF";
        }
        switchTab(tab);
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if(state.history.length === 0) return list.innerHTML = "目前沒有處理過的檔案。";
        list.innerHTML = state.history.map(h => `
            <div class="result-card">
                <img src="${h.url}" style="width:100px;">
                <p>${h.name} (${(h.size/1024/1024).toFixed(2)} MB)</p>
                <a href="${h.url}" download="${h.name}" class="btn btn-green">下載</a>
            </div>
        `).join('');
    }
</script>

</body>
</html>
